<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Knowledge Cosmos - 知识宇宙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <style>
        :root {
            --color-bg: #000000;
            --color-panel: rgba(0, 0, 0, 0.7);
            --color-panel-hover: rgba(0, 0, 0, 0.85);
            --color-border: rgba(255, 255, 255, 0.08);
            --color-border-active: rgba(0, 212, 255, 0.4);
            --color-accent: #00d4ff;
            --color-accent-dim: rgba(0, 212, 255, 0.3);
            --accent-glow: rgba(0, 212, 255, 0.12);
            --color-highlight: #ff6b35;
            --color-highlight-dim: rgba(255, 107, 53, 0.3);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --text-faint: rgba(255, 255, 255, 0.35);
            --font-mono: 'Inter', monospace;
            --font: 'Inter', sans-serif;
            --fast: 0.2s ease;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--color-bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #galaxy-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #galaxy-container canvas {
            display: block;
        }

        #hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .hud-panel {
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 14px 16px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            pointer-events: auto;
            transition: border-color var(--fast), background var(--fast);
        }

        .hud-panel:hover {
            border-color: var(--color-border-active);
            background: var(--color-panel-hover);
        }

        #top-center {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }

        #title {
            font-family: var(--font-mono);
            font-size: 18px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        #time-display {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 400;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-top: 4px;
        }

        #top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: auto;
        }

        #distance-display {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 400;
            color: var(--text-faint);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #distance-value {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        #top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
        }

        #search-box {
            position: relative;
            width: 220px;
        }

        #search-box input {
            width: 100%;
            padding: 8px 12px 8px 32px;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: border-color var(--fast), box-shadow var(--fast);
        }

        #search-box input::placeholder {
            color: var(--text-faint);
            font-size: 12px;
        }

        #search-box input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 1px var(--color-accent-dim), 0 0 20px var(--accent-glow);
        }

        #search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
            font-size: 13px;
            pointer-events: none;
        }

        #search-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 100%;
            max-height: 280px;
            overflow-y: auto;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: none;
            z-index: 100;
        }

        #search-results.visible {
            display: block;
        }

        .search-result-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background var(--fast);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: var(--accent-glow);
        }

        .search-result-item .result-name {
            font-size: 12px;
            color: var(--text);
            font-weight: 500;
        }

        .search-result-item .result-type {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 1px;
        }

        #info-panel {
            position: absolute;
            top: 80px;
            left: -340px;
            width: 300px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            pointer-events: auto;
            transition: left var(--transition);
        }

        #info-panel.visible {
            left: 20px;
        }

        #info-panel::-webkit-scrollbar {
            width: 3px;
        }

        #info-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        #info-panel::-webkit-scrollbar-thumb {
            background: var(--color-accent-dim);
            border-radius: 2px;
        }

        .info-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--color-border);
        }

        .info-panel-header h3 {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: 1px;
        }

        .info-close-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: 3px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            transition: all var(--fast);
            pointer-events: auto;
        }

        .info-close-btn:hover {
            border-color: var(--color-highlight);
            color: var(--color-highlight);
            background: var(--color-highlight-dim);
        }

        .info-section {
            margin-bottom: 14px;
        }

        .info-label {
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 500;
            color: var(--text-faint);
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .info-value {
            font-size: 13px;
            color: var(--text);
            font-weight: 400;
        }

        .info-value.type-blackhole { color: var(--color-highlight); }
        .info-value.type-galaxy { color: #4a90d9; }
        .info-value.type-satellite { color: #7ed321; }
        .info-value.type-asteroid { color: #f5a623; }
        .info-value.type-comet { color: #bd10e0; }

        .info-desc {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.7;
        }

        .related-nodes-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .related-node-item {
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            font-size: 12px;
            color: var(--text);
            cursor: pointer;
            transition: all var(--fast);
            pointer-events: auto;
        }

        .related-node-item:hover {
            background: var(--accent-glow);
            border-color: var(--color-border-active);
        }

        .related-tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            margin: 2px;
            transition: all var(--fast);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .related-tag:hover {
            border-color: var(--color-border-active);
            background: rgba(0, 212, 255, 0.15);
        }
        .parent-tag {
            color: #ffab40;
            background: rgba(255, 171, 64, 0.1);
            border-color: rgba(255, 171, 64, 0.2);
        }
        .child-tag {
            color: #69f0ae;
            background: rgba(105, 240, 174, 0.08);
            border-color: rgba(105, 240, 174, 0.15);
        }

        #bottom {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            width: auto;
            min-width: 480px;
        }

        #time-controller {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
        }

        .time-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: 3px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            transition: all var(--fast);
            pointer-events: auto;
            flex-shrink: 0;
        }

        .time-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .time-btn.active {
            background: var(--accent-glow);
            border-color: var(--color-accent);
            color: var(--color-accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .speed-presets {
            display: flex;
            gap: 4px;
        }

        .speed-preset-btn {
            padding: 3px 8px;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: 3px;
            color: var(--text-faint);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.5px;
            transition: all var(--fast);
            pointer-events: auto;
            white-space: nowrap;
        }

        .speed-preset-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .speed-preset-btn.active {
            background: var(--accent-glow);
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .time-slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 180px;
        }

        .time-slider-label {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-faint);
            letter-spacing: 2px;
            white-space: nowrap;
        }

        #time-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            pointer-events: auto;
        }

        #time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: var(--color-accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--color-accent-dim);
            transition: transform var(--fast), box-shadow var(--fast);
        }

        #time-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            box-shadow: 0 0 16px var(--color-accent);
        }

        #time-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: var(--color-accent);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px var(--color-accent-dim);
        }

        .time-display {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--color-accent);
            min-width: 50px;
            text-align: right;
            letter-spacing: 1px;
        }

        #bottom-right {
            position: absolute;
            bottom: 24px;
            right: 20px;
            pointer-events: auto;
        }

        #view-presets {
            display: flex;
            gap: 6px;
        }

        .view-preset-btn {
            padding: 6px 14px;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 3px;
            color: var(--text-dim);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1px;
            transition: all var(--fast);
            pointer-events: auto;
        }

        .view-preset-btn:hover {
            background: var(--color-panel-hover);
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .view-preset-btn.active {
            background: var(--accent-glow);
            border-color: var(--color-accent);
            color: var(--color-accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        #filter-toggle {
            position: absolute;
            bottom: 72px;
            right: 20px;
            pointer-events: auto;
        }

        #filter-toggle-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            transition: all var(--fast);
            pointer-events: auto;
        }

        #filter-toggle-btn:hover {
            background: var(--color-panel-hover);
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        #filter-toggle-btn.active {
            background: var(--accent-glow);
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        #filter-panel {
            position: absolute;
            bottom: 72px;
            right: 64px;
            width: 180px;
            opacity: 0;
            visibility: hidden;
            transform: translateX(10px);
            transition: all var(--fast);
            pointer-events: auto;
        }

        #filter-panel.visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        .filter-title {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            color: var(--color-accent);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            cursor: pointer;
            transition: opacity var(--fast);
            pointer-events: auto;
        }

        .filter-option:hover {
            opacity: 0.8;
        }

        .filter-checkbox {
            display: none;
        }

        .filter-check-visual {
            width: 14px;
            height: 14px;
            border: 1px solid var(--color-border);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all var(--fast);
            position: relative;
        }

        .filter-checkbox:checked + .filter-check-visual {
            border-color: var(--color-accent);
            background: var(--accent-glow);
        }

        .filter-checkbox:checked + .filter-check-visual::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--color-accent);
            border-radius: 1px;
        }

        .filter-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .filter-dot.blackhole { background: var(--color-highlight); }
        .filter-dot.galaxy { background: #4a90d9; }
        .filter-dot.satellite { background: #7ed321; }
        .filter-dot.asteroid { background: #f5a623; }
        .filter-dot.comet { background: #bd10e0; }

        .filter-label {
            font-size: 12px;
            color: var(--text-dim);
            user-select: none;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--color-bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.8s ease;
        }

        #loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-orbit {
            width: 140px;
            height: 140px;
            position: relative;
            margin-bottom: 40px;
        }

        .loading-orbit-ring {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .loading-orbit-ring:nth-child(1) {
            width: 60px;
            height: 60px;
            border-color: var(--color-accent-dim);
            animation: orbit-spin 2s linear infinite;
        }

        .loading-orbit-ring:nth-child(2) {
            width: 90px;
            height: 90px;
            border-color: rgba(0, 212, 255, 0.12);
            animation: orbit-spin 3s linear infinite reverse;
        }

        .loading-orbit-ring:nth-child(3) {
            width: 120px;
            height: 120px;
            border-color: rgba(0, 212, 255, 0.06);
            animation: orbit-spin 4s linear infinite;
        }

        .loading-orbit-core {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--color-accent);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--color-accent), 0 0 40px var(--accent-glow);
            animation: core-pulse 1.5s ease-in-out infinite;
        }

        .loading-orbit-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--color-accent);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--color-accent);
        }

        .loading-orbit-ring:nth-child(1) .loading-orbit-dot {
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
        }

        .loading-orbit-ring:nth-child(2) .loading-orbit-dot {
            top: 50%;
            right: -2px;
            transform: translateY(-50%);
        }

        .loading-orbit-ring:nth-child(3) .loading-orbit-dot {
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes orbit-spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes core-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.6; }
        }

        .loading-text {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: text-fade 2s ease-in-out infinite;
        }

        .loading-progress-bar {
            width: 160px;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 1px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loading-progress-fill {
            width: 0%;
            height: 100%;
            background: var(--color-accent);
            border-radius: 1px;
            transition: width 0.3s ease;
            box-shadow: 0 0 6px var(--color-accent);
        }

        @keyframes text-fade {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-accent-dim);
            border-radius: 2px;
        }

        @media (max-width: 1024px) {
            #info-panel {
                width: 260px;
            }

            #info-panel.visible {
                left: 10px;
            }

            #search-box {
                width: 180px;
            }

            #bottom {
                min-width: 400px;
            }

            #time-controller {
                padding: 10px 14px;
                gap: 10px;
            }

            .time-slider-container {
                min-width: 140px;
            }
        }

        @media (max-width: 768px) {
            #title {
                font-size: 14px;
                letter-spacing: 4px;
            }

            #time-display {
                font-size: 9px;
            }

            #info-panel {
                width: 240px;
                top: 70px;
                max-height: calc(100vh - 180px);
            }

            #info-panel.visible {
                left: 10px;
            }

            #search-box {
                width: 160px;
            }

            #bottom {
                min-width: auto;
                max-width: 95vw;
                bottom: 16px;
            }

            #time-controller {
                flex-wrap: wrap;
                justify-content: center;
                padding: 10px 12px;
                gap: 8px;
            }

            .time-slider-container {
                min-width: 100px;
                width: 100%;
                order: 10;
            }

            .speed-presets {
                order: 9;
            }

            #bottom-right {
                bottom: 16px;
                right: 10px;
            }

            #filter-toggle {
                bottom: 60px;
                right: 10px;
            }

            #filter-panel {
                bottom: 60px;
                right: 54px;
                width: 160px;
            }
        }

        @media (max-width: 480px) {
            #top-center {
                top: 12px;
            }

            #top-left {
                top: 12px;
                left: 12px;
            }

            #top-right {
                top: 12px;
                right: 12px;
            }

            #search-box {
                width: 120px;
            }

            #info-panel {
                width: calc(100vw - 24px);
                top: 55px;
                max-height: 45vh;
            }

            #info-panel.visible {
                left: 12px;
            }

            #bottom {
                bottom: 10px;
            }

            #bottom-right {
                bottom: 10px;
                right: 10px;
            }

            #filter-toggle {
                bottom: 54px;
                right: 10px;
            }

            #filter-panel {
                bottom: 54px;
                right: 54px;
            }

            .view-preset-btn {
                padding: 4px 10px;
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div id="galaxy-container"></div>

    <div id="hud-overlay">

        <div id="top-center">
            <div id="title">KNOWLEDGE COSMOS</div>
            <div id="time-display">2026.01.01 00:00:00 UTC</div>
        </div>

        <div id="top-left">
            <div class="hud-panel">
                <div id="distance-display">DISTANCE FROM CENTER</div>
                <div id="distance-value">0.0 AU</div>
            </div>
        </div>

        <div id="top-right">
            <div id="search-box">
                <span id="search-icon">&#128269;</span>
                <input type="text" id="search-input" placeholder="搜索天体..." autocomplete="off">
                <div id="search-results"></div>
            </div>
        </div>

        <div id="info-panel" class="hud-panel">
            <div class="info-panel-header">
                <h3 id="info-name">--</h3>
                <button id="info-close" class="info-close-btn">&times;</button>
            </div>
            <div class="info-section">
                <div class="info-label">类型</div>
                <div class="info-value" id="info-type">--</div>
            </div>
            <div class="info-section">
                <div class="info-label">所属领域</div>
                <div class="info-value" id="info-field">--</div>
            </div>
            <div class="info-section">
                <div class="info-label">轨道半径</div>
                <div class="info-value" id="info-orbit-radius">--</div>
            </div>
            <div class="info-section">
                <div class="info-label">描述</div>
                <div class="info-desc" id="info-description">--</div>
            </div>
            <div class="info-section">
                <div class="info-label">关联节点</div>
                <div class="related-nodes-list" id="info-related">--</div>
            </div>
        </div>

        <div id="bottom">
            <div id="time-controller" class="hud-panel">
                <button class="time-btn" id="btn-rewind" title="快退">&#9198;</button>
                <button class="time-btn" id="btn-play" title="播放/暂停">&#9654;</button>
                <button class="time-btn" id="btn-forward" title="快进">&#9197;</button>
                <div class="speed-presets">
                    <button class="speed-preset-btn" data-speed="0.25">0.25x</button>
                    <button class="speed-preset-btn active" data-speed="1">1x</button>
                    <button class="speed-preset-btn" data-speed="2">2x</button>
                    <button class="speed-preset-btn" data-speed="5">5x</button>
                    <button class="speed-preset-btn" data-speed="10">10x</button>
                </div>
                <div class="time-slider-container">
                    <span class="time-slider-label">TIME</span>
                    <input type="range" id="time-slider" min="0" max="1000" value="0" step="1">
                    <span class="time-display" id="time-display">0.00</span>
                </div>
            </div>
        </div>

        <div id="bottom-right">
            <div id="view-presets">
                <button class="view-preset-btn active" data-view="free">自由</button>
                <button class="view-preset-btn" data-view="top">俯视</button>
                <button class="view-preset-btn" data-view="side">侧面</button>
            </div>
        </div>

        <div id="filter-toggle">
            <button id="filter-toggle-btn" title="过滤">&#9881;</button>
        </div>

        <div id="filter-panel" class="hud-panel">
            <div class="filter-title">类型过滤</div>
            <label class="filter-option">
                <input type="checkbox" class="filter-checkbox" id="filter-blackhole" checked>
                <span class="filter-check-visual"></span>
                <span class="filter-dot blackhole"></span>
                <span class="filter-label">黑洞</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" class="filter-checkbox" id="filter-galaxy" checked>
                <span class="filter-check-visual"></span>
                <span class="filter-dot galaxy"></span>
                <span class="filter-label">星系核心</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" class="filter-checkbox" id="filter-satellite" checked>
                <span class="filter-check-visual"></span>
                <span class="filter-dot satellite"></span>
                <span class="filter-label">卫星</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" class="filter-checkbox" id="filter-asteroid" checked>
                <span class="filter-check-visual"></span>
                <span class="filter-dot asteroid"></span>
                <span class="filter-label">小行星</span>
            </label>
            <label class="filter-option">
                <input type="checkbox" class="filter-checkbox" id="filter-comet" checked>
                <span class="filter-check-visual"></span>
                <span class="filter-dot comet"></span>
                <span class="filter-label">彗星</span>
            </label>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="loading-orbit">
            <div class="loading-orbit-ring"><div class="loading-orbit-dot"></div></div>
            <div class="loading-orbit-ring"><div class="loading-orbit-dot"></div></div>
            <div class="loading-orbit-ring"><div class="loading-orbit-dot"></div></div>
            <div class="loading-orbit-core"></div>
        </div>
        <div class="loading-text">正在初始化知识宇宙</div>
        <div class="loading-progress-bar">
            <div class="loading-progress-fill" id="loading-progress"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
